<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <title>BRX Player</title>
</head>
<body>
  <main>
    <h1>BiliRoaming-webX Player</h1>

    <section>
      <label class="row switch-row">
        <input id="enabled" type="checkbox" class="switch">
        <span class="switch-label">启用扩展播放器</span>
      </label>

      <label class="field">
        <span class="field-label">服务端地址</span>
        <input id="serverBaseUrl" placeholder="https://example.com">
      </label>

      <div class="grid2">
        <label class="field">
          <span class="field-label">模式</span>
          <select id="clientMode">
            <option value="web">Web</option>
            <option value="app">App</option>
          </select>
        </label>
        <label class="field">
          <span class="field-label">区域</span>
          <select id="area">
            <option value="hk">HK 港澳台</option>
            <option value="tw">TW 台湾</option>
            <option value="th">TH 泰国</option>
            <option value="cn">CN 大陆</option>
          </select>
        </label>
      </div>

      <label class="row switch-row" title="关闭后 Web 模式不会发送 x-from-biliroaming / platform-from-biliroaming 等漫游请求头，用于兼容旧 PHP 后端 code=-15。">
        <input id="webRoamingHeaders" type="checkbox" class="switch">
        <span class="switch-label">Web 模式发送漫游请求头</span>
      </label>
      <p class="hint">旧 PHP 后端报 code=-15 / 错误请求头时，请关闭此项。</p>

      <label class="field">
        <span class="field-label">Access Key</span>
        <textarea id="accessKey" rows="3" placeholder="App 模式可填写 access_key"></textarea>
      </label>
      <button id="readKey" type="button" class="ghost">从当前 B 站页面读取 access_key</button>
    </section>

    <section>
      <h2>播放器默认</h2>
      <div class="grid2">
        <label class="field">
          <span class="field-label">清晰度</span>
          <select id="defaultQn">
            <option value="auto">自动</option>
            <option value="120">4K</option>
            <option value="116">1080P60</option>
            <option value="112">1080P+</option>
            <option value="80">1080P</option>
            <option value="74">720P60</option>
            <option value="64">720P</option>
            <option value="32">480P</option>
            <option value="16">360P</option>
          </select>
        </label>
        <label class="field">
          <span class="field-label">编码</span>
          <select id="defaultCodec">
            <option value="auto">自动</option>
            <option value="avc">AVC</option>
            <option value="hevc">HEVC</option>
            <option value="av1">AV1</option>
          </select>
        </label>
      </div>
      <label class="field">
        <span class="field-label">音轨</span>
        <select id="defaultAudioId">
          <option value="auto">自动</option>
        </select>
      </label>
    </section>

    <div class="actions">
      <button id="save" type="button" class="primary">保存配置</button>
      <button id="reload" type="button" class="secondary">刷新页面</button>
    </div>
    <p id="status"></p>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
